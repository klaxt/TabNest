  <path d="M 16,114 Q 64,98 112,114" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Tab ear -->
  <rect x="16" y="18" width="42" height="22" rx="6" fill="white"/>
  <!-- Tab body -->
  <rect x="16" y="32" width="96" height="58" rx="8" fill="white"/>

  <!-- Grouped lines inside tab -->
  <!-- Group 1 header -->
  <rect x="28" y="44" width="52" height="5" rx="2.5" fill="#667eea" opacity="0.55"/>
  <!-- Group 1 sub-items -->
  <rect x="36" y="54" width="38" height="4" rx="2" fill="#667eea" opacity="0.3"/>
  <rect x="36" y="62" width="30" height="4" rx="2" fill="#667eea" opacity="0.3"/>

  <!-- Divider -->
  <rect x="24" y="72" width="72" height="1.5" rx="0.75" fill="#667eea" opacity="0.2"/>

  <!-- Group 2 header -->
  <rect x="28" y="78" width="44" height="5" rx="2.5" fill="#667eea" opacity="0.55"/>
</svg>
